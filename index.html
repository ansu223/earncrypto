<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Win Free Crypto</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial, sans-serif;
  background:radial-gradient(circle,#1a2f3f,#0a0f1a);
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;color:#fff;padding:12px;
}

.mobile-card{
  max-width:400px;width:100%;
  background:#0a1220;
  border-radius:30px;
  padding:24px;
  text-align:center;
  border:1px solid #22c55e50;
}

h1{
  font-size:2rem;
  background:linear-gradient(#22c55e,#bef264);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.sub{color:#9ca3af;margin:8px 0 16px;}

.crypto-row{display:flex;justify-content:center;gap:10px;margin:10px 0;}

.chip{
  background:#22c55e20;
  padding:10px 16px;
  border-radius:30px;
  border:1px solid #22c55e;
}

.urgent{
  background:#b91c1c;
  padding:8px;
  border-radius:30px;
  margin:10px 0;
  box-shadow:0 0 10px red;
}

#countdown{margin-top:6px;font-weight:bold;}

.mobile-btn{
  display:block;
  background:linear-gradient(#22c55e,#15803d);
  padding:16px;
  border-radius:40px;
  margin:16px 0;
  text-decoration:none;
  color:white;
  font-weight:bold;
  font-size:1.3rem;
}

.mobile-btn:active{transform:scale(0.97);}

.trust-strip{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  font-size:0.8rem;
  margin-top:10px;
  color:#ccc;
}

.live-counter{
  margin-top:12px;
  color:#22c55e;
}

.micro{
  font-size:0.8rem;
  color:#888;
  margin-top:8px;
}
</style>
</head>

<body>

<div class="mobile-card">

<h1>💰 WIN $1 CRYPTO ⚡</h1>
<div class="sub">instant reward · limited daily spins</div>

<div class="crypto-row">
  <div class="chip">USDT</div>
  <div class="chip">XRP</div>
  <div class="chip">DOGE</div>
</div>

<div style="font-size:0.9rem;color:#9ca3af;">
🎁 Get random crypto reward instantly
</div>

<div class="urgent">
⏳ only 19 boxes left
<div id="countdown">⏱️ offer ends in 00:30</div>
</div>

<a class="mobile-btn" id="mainBtn" href="https://t.me/redpacket_gift_bot?start=bonus">
🤖 CLAIM YOUR FREE $1 →
</a>

<div class="trust-strip">
<span>🛡️ no wallet</span>
<span>⚡ instant</span>
<span>✅ safe</span>
<span>🎲 no deposit</span>
</div>

<div class="live-counter">
👥 <span id="liveCount">2483</span> users today
</div>

<div class="micro" id="msg">
🔥 just claimed 2 seconds ago
</div>

<!-- SECOND CTA -->
<a class="mobile-btn" href="https://t.me/redpacket_gift_bot?start=bonus">
🔥 GET BONUS SPIN NOW
</a>

</div>

<script>
// COUNTDOWN
let time = 30;
setInterval(()=>{
  if(time>0){
    time--;
    document.getElementById("countdown").innerText =
    "⏱️ offer ends in 00:"+(time<10?"0"+time:time);
  }
},1000);

// COUNTER
let count=2483;
setInterval(()=>{
  count+=Math.floor(Math.random()*3);
  document.getElementById("liveCount").innerText=count;
},5000);

// MESSAGES
const msgs=[
"🔥 someone got 0.8 USDT",
"🔥 new win: 3 XRP",
"🔥 reward claimed 5s ago",
"🔥 0.5 DOGE claimed",
];
setInterval(()=>{
 document.getElementById("msg").innerText=
 msgs[Math.floor(Math.random()*msgs.length)];
},4000);

// VIBRATION
document.getElementById("mainBtn").onclick=()=>{
 if(navigator.vibrate) navigator.vibrate(50);
};

// AUTO REDIRECT
setTimeout(()=>{
 window.location.href="https://t.me/redpacket_gift_bot?start=bonus";
},7000);
</script>

</body>
</html>
